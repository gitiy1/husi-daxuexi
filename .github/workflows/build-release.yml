name: Build Husi From Source

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "构建目标：app 为 husi 本体，其它为 husi 插件"
        required: true
        type: choice
        default: "app"
        options:
          - app
          - hysteria2
          - juicity
          - mieru
          - naive
          - shadowquic
      vivo_app_id:
        description: "伪装 Vivo App ID（留空：本体默认 2407867，插件默认 284567）"
        required: false
        default: ""
      package_name:
        description: "覆盖 package/applicationId（留空则自动取 Vivo package_name）"
        required: false
        default: ""
      app_name:
        description: "覆盖应用名（留空则自动取 Vivo title_zh/title_en）"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Set up Android SDK cmdline tools
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          sudo curl -L -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          sudo unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          sudo mkdir -p /opt/android-sdk/cmdline-tools/latest
          sudo mv /opt/android-sdk/cmdline-tools/cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/
          sudo chmod +x /opt/android-sdk/cmdline-tools/latest/bin/*

      - name: Install Android SDK packages
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-23" "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.14206865" "platform-tools"

      - name: Install APK and icon tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool imagemagick webp

      - name: Build & sign APK from source (uber-apk-signer)
        env:
          BUILD_TARGET: ${{ github.event.inputs.build_target }}
          VIVO_APP_ID: ${{ github.event.inputs.vivo_app_id }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/29.0.14206865
        run: |
          args=(--target "${BUILD_TARGET:-app}" --min-version-code 10001 --version-offset 10000)
          if [ -n "${VIVO_APP_ID}" ]; then
            args+=(--vivo-app-id "${VIVO_APP_ID}")
          fi
          if [ -n "${PACKAGE_NAME}" ]; then
            args+=(--package-name "${PACKAGE_NAME}")
          fi
          if [ -n "${APP_NAME}" ]; then
            args+=(--app-name "${APP_NAME}")
          fi
          python3 scripts/repack_husi.py "${args[@]}"

      - name: Compute release tag
        id: vars
        run: |
          TS=$(date -u +'%Y%m%d-%H%M%S')
          echo "tag=v${TS}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Source-built husi ${{ github.event.inputs.build_target }} ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: dist/*.apk
