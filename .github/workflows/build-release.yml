name: Build Husi From Source

on:
  workflow_dispatch:
    inputs:
      vivo_app_id:
        description: "Vivo 学习强国 App ID（默认 2407867）"
        required: false
        default: "2407867"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install apktool
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool

      - name: Build unsigned APK from source
        env:
          VIVO_APP_ID: ${{ github.event.inputs.vivo_app_id }}
        run: |
          python3 scripts/repack_husi.py --vivo-app-id "${VIVO_APP_ID:-2407867}" --min-version-code 10001 --version-offset 10000

      - name: Sign APK with GitHub secrets
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: dist
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Compute release tag
        id: vars
        run: |
          TS=$(date -u +'%Y%m%d-%H%M%S')
          echo "tag=v${TS}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Source-built husi ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
