name: Build Husi From Source

on:
  workflow_dispatch:
    inputs:
      vivo_app_id:
        description: "Vivo 学习强国 App ID（默认 2407867）"
        required: false
        default: "2407867"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Set up Android SDK cmdline tools
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          sudo curl -L -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          sudo unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          sudo mkdir -p /opt/android-sdk/cmdline-tools/latest
          sudo mv /opt/android-sdk/cmdline-tools/cmdline-tools/* /opt/android-sdk/cmdline-tools/latest/
          sudo chmod +x /opt/android-sdk/cmdline-tools/latest/bin/*

      - name: Install Android SDK packages
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-23" "platforms;android-37.0" "build-tools;37.0.0" "ndk;29.0.14206865" "platform-tools"

      - name: Install apktool
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool

      - name: Build & sign APK from source (uber-apk-signer)
        env:
          VIVO_APP_ID: ${{ github.event.inputs.vivo_app_id }}
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/29.0.14206865
        run: |
          python3 scripts/repack_husi.py --vivo-app-id "${VIVO_APP_ID:-2407867}" --min-version-code 10001 --version-offset 10000

      - name: Compute release tag
        id: vars
        run: |
          TS=$(date -u +'%Y%m%d-%H%M%S')
          echo "tag=v${TS}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Source-built husi ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: dist/*.apk
